<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>
        HTMX Task Manager
    </title>


    <link
        rel="stylesheet"
        href="/style.css"
    >


    <!-- HTMX -->
    <script
        src="https://unpkg.com/htmx.org@2.0.4">
    </script>


    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    >


</head>


<body>


<div class="app">


    <!-- Header -->

    <header class="hero">


        <div class="logo">

            ⚡

        </div>


        <h1>

            HTMX Task Manager

        </h1>


        <p>

            Modern Server-Driven UI built with
            <strong>
                HTMX + Express
            </strong>

        </p>


        <div class="tech-tags">


            <span>
                HTMX
            </span>


            <span>
                Node.js
            </span>


            <span>
                Express
            </span>


            <span>
                Server UI
            </span>


        </div>


    </header>





    <!-- Create Task -->

    <section class="create-section">


        <form

            hx-post="/tasks"

            hx-target="#task-container"

            hx-swap="innerHTML"

            class="task-form"

        >


            <div class="input-group">


                <input

                    type="text"

                    name="title"

                    placeholder="What needs to be done?"

                    required

                >


            </div>





            <div class="input-row">


                <div>

                    <label>
                        Due Date
                    </label>


                    <input

                        type="datetime-local"

                        name="dueDate"

                    >

                </div>





                <div>

                    <label>
                        Priority
                    </label>


                    <select name="priority">


                        <option value="low">

                            🟢 Low

                        </option>



                        <option value="medium" selected>

                            🟡 Medium

                        </option>



                        <option value="high">

                            🔴 High

                        </option>


                    </select>


                </div>


            </div>





            <button class="add-btn">


                + Create Task


            </button>



        </form>


    </section>






    <!-- Search -->


    <section class="search-section">


        <input

            type="search"

            placeholder="🔍 Search tasks..."

            name="q"


            hx-get="/tasks/search"

            hx-target="#task-container"

            hx-trigger="keyup changed delay:400ms"


        >



    </section>







    <!-- Tasks -->


    <main

        id="task-container"

    >


    </main>






    <!-- HTMX Info -->


    <section class="htmx-info">


        <h2>

            ⚡ How HTMX Works

        </h2>


        <div class="flow">


            <div>

                Browser

            </div>


            <span>
                →
            </span>


            <div>

                HTMX Request

            </div>


            <span>
                →
            </span>


            <div>

                Express

            </div>


            <span>
                →
            </span>


            <div>

                HTML Fragment

            </div>


        </div>


    </section>






    <footer>


        <p>

            Built with ❤️ using HTMX + Express

        </p>


    </footer>



</div>




<script>


// Load initial tasks

document.addEventListener(
    "DOMContentLoaded",
    ()=>{


        htmx.ajax(

            "GET",

            "/tasks/search?q=",

            {

                target:"#task-container",

                swap:"innerHTML"

            }

        );


    }
);



</script>


</body>


</html>
